<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Сторінку не знайдено | I CAN Women Foundation</title>
  <link rel="icon" href="images/logo-ican-foundation.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #D989A3;
      --dark: #1C1819;
      --mid: #4D4548;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      color: var(--mid);
      background: #FFFBFC;
    }
    .card {
      max-width: 420px;
      text-align: center;
      background: #fff;
      border: 1px solid #E8E0E3;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    h1 {
      font-family: Onest, sans-serif;
      font-size: 1.5rem;
      color: var(--dark);
      margin-bottom: 0.75rem;
    }
    p { font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.5rem; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: Onest, sans-serif;
      font-weight: 600;
      font-size: 0.9375rem;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    a:hover { background: #C4708D; transform: translateY(-1px); }
    code { font-size: 2.5rem; font-weight: 700; color: var(--accent); font-family: Onest, sans-serif; }
  </style>
</head>
<body>
  <div class="card">
    <p><code>404</code></p>
    <h1>Сторінку не знайдено</h1>
    <p>Можливо, посилання застаріло або в адресі помилка. Поверніться на головну або скористайтеся меню сайту.</p>
    <a href="index.html">На головну</a>
  </div>
</body>
</html>
